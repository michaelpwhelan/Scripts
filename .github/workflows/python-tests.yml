name: Python Tests

on:
  push:
    branches: [main]
    paths: ['python/logparse/**']
  pull_request:
    branches: [main]
    paths: ['python/logparse/**']

defaults:
  run:
    working-directory: python/logparse

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: python/logparse/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run unit tests with coverage
        run: pytest tests/test_parsers.py -v --cov=logparse --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: python/logparse/coverage.xml

  fuzz-quick:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
          cache-dependency-path: python/logparse/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Generate test fixtures
        run: python logparse_testdata.py --output-dir /tmp/logparse-test-fixtures

      - name: Run fuzz-1000 suite
        run: pytest tests/test_fuzz_1000.py -v --timeout=120
