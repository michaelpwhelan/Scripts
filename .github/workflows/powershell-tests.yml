name: PowerShell Tests

on:
  push:
    branches: [main]
    paths: ['powershell/**']
  pull_request:
    branches: [main]
    paths: ['powershell/**']

jobs:
  pester-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0

      - name: Run Pester tests
        shell: pwsh
        run: |
          Invoke-Pester -Path 'powershell/' -Recurse -Output Detailed -CI
